<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <meta name="description" content="A beautiful and minimal to-do list app to manage your daily tasks.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="output.css">
</head>

<body class="bg-surface-900 text-white min-h-screen flex flex-col items-center px-4 py-10 md:py-16">

    <!-- Ambient glow background -->
    <div
        class="fixed top-0 left-1/2 -translate-x-1/2 w-[700px] h-[700px] bg-accent/20 rounded-full blur-[120px] pointer-events-none">
    </div>

    <!-- Header -->
    <div class="relative z-10 text-center mb-8 animate-slide-up">
        <h1
            class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-accent-light via-accent to-purple-400 bg-clip-text text-transparent">
            To-Do List
        </h1>
        <p class="text-gray-500 text-sm mt-2 font-light tracking-wide">Stay organized. Stay focused.</p>
    </div>

    <!-- Main Card -->
    <div class="relative z-10 w-full max-w-xl bg-surface-800/80 backdrop-blur-xl rounded-2xl border border-white/5 shadow-card p-6 flex flex-col gap-5 animate-slide-up"
        style="max-height: calc(100vh - 180px);">

        <!-- Input Section -->
        <div class="flex flex-col sm:flex-row gap-3">
            <input type="text" id="todo-input" placeholder="What needs to be done?"
                class="w-full sm:flex-1 px-4 py-3 bg-surface-700/60 border border-white/5 rounded-xl text-white text-sm placeholder-gray-500
                          transition-all duration-200
                          focus:outline-none focus:border-accent/50 focus:ring-2 focus:ring-accent/20 focus:bg-surface-700" />
            <button id="add-task-btn" class="btn-primary w-full sm:w-auto flex items-center justify-center gap-2 whitespace-nowrap" title="Add Task">
                <i class="fa-solid fa-plus"></i>
                Add
            </button>
        </div>

        <!-- Stats Bar -->
        <div id="stats-bar" class="items-center gap-4 text-xs text-gray-500 px-1 hidden">
            <span id="total-count">0 tasks</span>
            <span class="w-px h-3 bg-white/10"></span>
            <span id="done-count" class="text-success/70">0 done</span>
            <span class="w-px h-3 bg-white/10"></span>
            <span id="pending-count" class="text-accent-light/70">0 pending</span>
        </div>

        <!-- Task List -->
        <ul id="todo-list" class="flex flex-col gap-2.5 overflow-y-auto flex-1 pr-1"></ul>

        <!-- Empty State -->
        <div id="empty-state" class="flex flex-col items-center justify-center py-12 text-center">
            <div class="w-16 h-16 rounded-full bg-surface-600/50 flex items-center justify-center mb-4">
                <i class="fa-solid fa-clipboard-list text-2xl text-gray-600"></i>
            </div>
            <p class="text-gray-500 text-sm font-medium">No tasks yet</p>
            <p class="text-gray-600 text-xs mt-1">Add a task above to get started</p>
        </div>
    </div>

    <!-- Footer -->
    <footer
        class="fixed bottom-0 left-0 right-0 z-50 w-full flex items-center justify-between px-8 py-3 bg-surface-900/80 backdrop-blur-md border-t border-white/5">
        <p class="text-gray-500 text-xs tracking-wide">
            Designed and Created by
            <a href="https://bhavitgupta.onrender.com" target="_blank" rel="noopener noreferrer"
                class="text-accent-light hover:text-accent transition-colors duration-200 font-semibold">
                Bhavit Gupta
            </a>
        </p>
        <a href="https://github.com/bhavit-gupta" target="_blank" rel="noopener noreferrer"
            class="text-gray-500 hover:text-white transition-colors duration-200 text-xl" title="GitHub">
            <i class="fa-brands fa-github"></i>
        </a>
    </footer>

    <script src="script.js"></script>
</body>

</html>
